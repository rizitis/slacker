# slacker.conf — global settings (KEY=value, # for comments)

# ARCH is auto-detected from your installed system (from the aaa_base package,
# like slackpkg). Only uncomment this to FORCE a specific architecture, e.g.
# for cross/ARM setups:
#ARCH=x86_64

# Where downloaded metadata and packages are cached.
CACHE_DIR=/var/cache/slacker

# Installed-package database (current Slackware location).
PKG_DB_DIR=/var/lib/pkgtools/packages

# Read .dep files next to packages and pull in dependencies from the same repo.
# On by default; set to "no" to disable (then dependencies are never resolved).
# Can also be turned off per-run with --no-deps.
RESOLVE_DEPS=yes

# Build tags that clean-system should NOT treat as foreign. Packages from
# sources slacker doesn't manage as binary repos (SBo source builds, your own
# builds, other tagged repos) carry a build tag after the build number, e.g.
# 1_SBo -> _SBo, 7cf -> cf, 1alien -> alien. List those tags here (space-
# separated) so clean-system leaves them alone. Empty = clean-system sees all.
# Example: IGNORE_TAGS=_SBo cf alien _FRG _custom _SC _wsr
IGNORE_TAGS=
