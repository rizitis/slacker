# /etc/slacker/slacker.conf — global settings for slacker.
#
# Format: KEY=value, one per line. '#' starts a comment (whole-line or inline).
# Values may be quoted. Every key is OPTIONAL; the built-in default is shown
# next to each. Repositories and the active mirror live in separate files
# (`repos` and `mirrors`), not here.
#
# Lines that match the default are left commented out — uncomment and edit only
# what you want to change.


# ── Paths ────────────────────────────────────────────────────────────────────

# Where slacker stores downloaded packages and repository metadata (PACKAGES.TXT,
# CHECKSUMS, MANIFEST, .dep). Re-downloadable scratch space — safe to clear
# (e.g. `slacker clean-cache`).
#CACHE_DIR=/var/cache/slacker

# Where slacker keeps persistent SECURITY STATE: the GPG keyring, the trust-on-
# first-use fingerprint pins (*.fpr), and the repo quarantine/trust markers. Kept
# OUT of CACHE_DIR on purpose — /var/cache is disposable (an admin or cron sweep
# may wipe it), and losing these trust anchors would silently re-pin whatever key
# a repo serves on next contact. On first run slacker migrates any existing state
# out of the old CACHE_DIR location here automatically.
#STATE_DIR=/var/lib/slacker

# Slackware pkgtools admin root (holds packages/, removed_packages/, scripts/,
# setup/). The installed-package DB defaults to ADM_DIR/packages, and revert-pkg
# reads previous versions from ADM_DIR/removed_packages.
#ADM_DIR=/var/adm

# Override the installed-package database location. Defaults to ADM_DIR/packages;
# only set this if your admin DB lives somewhere non-standard.
#PKG_DB_DIR=/var/adm/packages


# ── Architecture ─────────────────────────────────────────────────────────────

# Normally auto-detected from the installed system (like slackpkg). Set it only
# to force a specific architecture, e.g. for cross/ARM setups.
#ARCH=x86_64


# ── Dependencies ─────────────────────────────────────────────────────────────

# Resolve .dep files and pull in dependencies (on by default). Set to off to
# disable .dep handling entirely. Note: official Slackware has no .dep files;
# this only affects third-party repos that ship them.
#RESOLVE_DEPS=on

# Build tags that clean-system should NOT treat as foreign (space-separated).
# Useful for your own builds and SBo. Example:
#IGNORE_TAGS=_SBo cf alien _FRG


# ── Verification ─────────────────────────────────────────────────────────────

# Global default verification policy applied to every repo (a repo line may
# override it with its own verify= flag). One of:
#   all              GPG signature when available, plus md5/sha integrity (default)
#   none             no verification (NOT recommended)
#   gpg,md5,sha      explicit comma list (any subset; listed methods are required)
#VERIFY=all


# ── Downloads ────────────────────────────────────────────────────────────────

# How many packages to download concurrently. 1 = serial (old behaviour),
# higher = faster on multi-mirror upgrades. Clamped to 1..=16; default 4.
MAX_PARALLEL=4


# ── Rollback (revert-pkg) ────────────────────────────────────────────────────

# Master switch for the `revert-pkg` command (rollback an official package to a
# previous -current version). on by default; set to off to disable the command
# outright. revert-pkg also refuses unless the system is -current.
REVERT=on

# Source archive that revert-pkg fetches old -current packages from. This is a
# REVERT-ONLY source: it is never consulted by update / upgrade / install /
# check-updates, so its historical packages can never leak into the normal
# priority model. Must point at a -current cumulative tree.
CUMULATIVE_URL=https://slackware.uk/cumulative/slackware64-current
