# /etc/slacker/distro-upgrade.conf
#
# OPTIONAL configuration for `slacker upgrade-dist` (distribution upgrade).
#
# Normally `upgrade-dist` re-points your active mirror's release directory from
# the running release to the target (e.g. slackware64-15.0 -> slackware64-current)
# and pulls every package over the network. That is the right thing on a machine
# with a fast internet connection and nothing better around.
#
# When you instead have the WHOLE target release available LOCALLY -- a local
# HTTP mirror on the LAN, a clone on an NFS/local disk, or the install ISO/DVD
# mounted -- you can point the dist-upgrade at it and avoid downloading several
# gigabytes again. That is what this file is for.
#
# This file is read ONLY by `upgrade-dist`. It never affects update / upgrade-all
# / install / check-updates / revert. If the file is absent or the key below is
# empty (the default), `upgrade-dist` behaves exactly as before (remote).
#
# ---------------------------------------------------------------------------
# DISTRO_UPGRADE_MIRROR
# ---------------------------------------------------------------------------
# The base URL of a LOCAL copy of the TARGET release tree. Leave it commented
# (or empty) for the normal remote dist-upgrade.
#
# Supported URL schemes:
#   http://   https://     a mirror you serve on the LAN
#   file://                 a local-disk / NFS clone, or a mounted ISO
#
# Whatever you point at must be a real Slackware tree: it must serve a
# PACKAGES.TXT at its root (slacker checks this BEFORE it changes anything and
# refuses if it is missing or unreachable).
#
# TWO SHAPES ARE SUPPORTED:
#
#   (1) A mirror tree whose path still contains the release segment
#       `slackware{64}-<release>`. slacker reads the release from the path and
#       REQUIRES it to match the target you pass to `upgrade-dist` -- a strong
#       guard against pointing at the wrong release by accident.
#
#         DISTRO_UPGRADE_MIRROR=http://192.168.1.10/slackware/slackware64-current/
#         DISTRO_UPGRADE_MIRROR=file:///srv/mirror/slackware64-current/
#
#   (2) A mounted install ISO / a path with NO release segment. slacker cannot
#       read the release from such a path, so it CANNOT auto-verify it -- it
#       prints a warning and proceeds on the explicit target argument you gave
#       plus the typed confirmation. Make sure the mount really is the target
#       release.
#
#         # mount first, e.g.:
#         #   mount -o loop,ro slackware64-current-install-dvd.iso /mnt/iso
#         DISTRO_UPGRADE_MIRROR=file:///mnt/iso/
#
# NOTES
#   * The target release is always the ARGUMENT to upgrade-dist
#     (`slacker upgrade-dist current`), never read from this file. This file
#     only says WHERE to fetch it from.
#   * `mirror` / `mirror/patches` repos in your `repos` file automatically follow
#     this local mirror during the upgrade. A mounted ISO has no patches/ tree;
#     that is harmless (it simply provides nothing).
#   * After the upgrade your active mirror will point at this LOCAL source, which
#     is useless once the ISO is unmounted. slacker reminds you at the end to set
#     a remote -current mirror (uncomment one in `mirrors`, or `slacker
#     find-mirror`) and clear this key, so future `slacker update` works online.
#   * slacker speaks HTTPS with TLS compiled into the binary (bundled CA roots)
#     and reads file:// directly, so it needs NO system libssl/OpenSSL and no
#     extra libraries -- it keeps working through the whole upgrade even while
#     glibc/openssl on the system are being replaced underneath it. That is
#     exactly why a local-mirror dist-upgrade is safe to run in one shot.
#
# Default: unset (remote dist-upgrade).
#DISTRO_UPGRADE_MIRROR=
