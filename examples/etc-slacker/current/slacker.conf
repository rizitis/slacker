# slacker.conf — global settings (KEY=value, # for comments)

# ARCH is auto-detected from your installed system (from the aaa_base package,
# like slackpkg). Only uncomment this to FORCE a specific architecture, e.g.
# for cross/ARM setups:
#ARCH=x86_64

# Where downloaded metadata and packages are cached.
CACHE_DIR=/var/cache/slacker

# Slackware pkgtools admin root: the directory that holds packages/,
# removed_packages/, scripts/ and setup/. The installed-package database is read
# from ADM_DIR/packages, and slacker reaches the sibling directories from here
# for current and future use. /var/adm is the canonical admin dir on Slackware
# and the only one that exposes the whole set by name (removed_* live under a
# different physical path). Default: /var/adm.
ADM_DIR=/var/adm

# Installed-package database. Leave this commented to use ADM_DIR/packages
# (recommended). Uncomment ONLY to point at a non-standard location; when set it
# overrides ADM_DIR.
#PKG_DB_DIR=/var/lib/pkgtools/packages

# Read .dep files next to packages and pull in dependencies from the same repo.
# On by default; set to "no" to disable (then dependencies are never resolved).
# Can also be turned off per-run with --no-deps.
RESOLVE_DEPS=yes

# Build tags that clean-system should NOT treat as foreign. Packages from
# sources slacker doesn't manage as binary repos (SBo source builds, your own
# builds, other tagged repos) carry a build tag after the build number, e.g.
# 1_SBo -> _SBo, 7cf -> cf, 1alien -> alien. List those tags here (space-
# separated) so clean-system leaves them alone. Empty = clean-system sees all.
# Example: IGNORE_TAGS=_SBo cf alien _FRG _custom _SC _wsr
IGNORE_TAGS=

# Package verification. Applies to every repo unless a repo overrides it with
# `verify=` in the 'repos' file.
#   all          verify every method a repo provides: GPG signature when present
#                (a bad one always fails) plus at least one of md5/sha. If no
#                checksum is available at all, install stops. (fail-closed)
#   gpg,md5,sha  require exactly these; if one is missing slacker stops and says
#                how to relax it.
#   VERIFY=none  disable all verification (not recommended).
VERIFY=all
